<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080810">
<title>Plex Ignore</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;--surf:#0e0e1a;--surf2:#131325;--border:#1e1e30;
  --accent:#e05cff;--accent2:#ff5ca8;--accent3:#5cffb8;
  --muted:#3a3a58;--text:#dcdcf0;--danger:#ff4455;
  --ignored:#2a0a3a;--ignored-border:#9020d0;--ignored-text:#d080ff;
  --covered:#0a1e2a;--covered-border:#2060a0;--covered-text:#60b8ff;
  --folder-bg:#111820;--folder-border:#1e3040;--folder-text:#80c8ff;
  --folder-ign-bg:#1a0a2a;--folder-ign-border:#6020b0;--folder-ign-text:#c070ff;
  --r:13px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}

/* ── header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(180deg,#0d0d20 0%,transparent 100%);
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-.02em}
.logo-plex{color:var(--accent);text-shadow:0 0 18px #c040ff80}
.logo-ign{color:var(--text);opacity:.28;font-style:normal}
.hdr-right{display:flex;align-items:center;gap:8px}
#dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .4s}
#dot.ok{background:var(--accent3);box-shadow:0 0 8px var(--accent3)}
#dot.err{background:var(--danger);box-shadow:0 0 8px var(--danger)}
#lbl-status{font-size:.6rem;color:var(--muted)}

/* ── offline banner ── */
#offline-banner{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:32px 24px;flex:1;text-align:center;
}
#offline-banner .ei{font-size:2.8rem;opacity:.3}
#offline-banner h3{font-family:'Syne',sans-serif;font-size:1rem}
#offline-banner p{font-size:.68rem;color:var(--muted);line-height:1.7;max-width:260px}
#offline-banner code{
  background:var(--surf);border:1px solid var(--border);border-radius:8px;
  padding:10px 16px;font-size:.73rem;color:var(--accent);display:block;
  text-align:left;white-space:pre;line-height:1.6;
}
.btn-retry{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 24px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:.8rem;cursor:pointer;transition:border-color .15s,background .15s;
}
.btn-retry:hover{border-color:var(--accent);color:var(--accent)}
.btn-retry:active{background:var(--border)}

/* ── main ── */
#main{flex:1;display:none;flex-direction:column;overflow:hidden}

/* search bar */
.search-wrap{padding:9px 12px 0;flex-shrink:0;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--surf);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--accent)}
.search-ico{font-size:.85rem;opacity:.4;flex-shrink:0}
#search-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;
  caret-color:var(--accent);
}
#search-input::placeholder{color:var(--muted)}
#search-clear{
  background:none;border:none;color:var(--muted);font-size:.85rem;
  cursor:pointer;padding:0 2px;display:none;line-height:1;
}
#search-clear.visible{display:block}

.toolbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  margin-top:8px;
}
.tb-info{flex:1;font-size:.62rem;color:var(--muted)}
.tb-info b{color:var(--accent3)}
.tb-info .ign-count{color:var(--ignored-text)}
.btn-sm{
  background:var(--surf);border:1px solid var(--border);border-radius:9px;
  padding:7px 13px;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:.63rem;cursor:pointer;transition:background .15s;white-space:nowrap;
}
.btn-sm:active{background:var(--border)}

/* filter tabs */
.tabs{
  display:flex;gap:6px;padding:8px 14px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.tab{
  flex:1;text-align:center;padding:6px 4px;border-radius:8px;font-size:.62rem;
  border:1px solid var(--border);cursor:pointer;background:var(--surf);
  color:var(--muted);transition:all .18s;
}
.tab.active{background:var(--surf2);border-color:var(--accent);color:var(--accent)}
.tab:active{background:var(--border)}

#list{
  flex:1;overflow-y:auto;padding:10px 12px;
  display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;
}
#list::-webkit-scrollbar{width:2px}
#list::-webkit-scrollbar-thumb{background:var(--border)}

/* ── cards (archivos) ── */
.card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 13px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .2s,background .15s,opacity .2s;
  animation:si .2s ease both;
}
.card:active{background:var(--border)}

/* archivo ignorado explícitamente */
.card.ignored{
  background:var(--ignored);border-color:var(--ignored-border);
  border-left:3px solid var(--accent);
}
/* archivo cubierto por carpeta ignorada */
.card.covered{
  background:var(--covered);border-color:var(--covered-border);
  border-left:3px solid var(--covered-border);
}
.card.ignored .ico{color:var(--accent)}
.card.covered .ico{color:var(--covered-text)}
.card.busy{opacity:.5;pointer-events:none}
.card.fail{border-color:var(--danger)}
.card.subdir{opacity:.88}

/* ── cards (carpetas) ── */
.folder-card{
  background:var(--folder-bg);border:1px solid var(--folder-border);border-radius:var(--r);
  padding:11px 13px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:border-color .2s,background .15s,opacity .2s;
  animation:si .2s ease both;border-left:3px solid var(--folder-border);
}
.folder-card:active{background:var(--border)}
.folder-card.ignored{
  background:var(--folder-ign-bg);border-color:var(--folder-ign-border);
  border-left:3px solid var(--folder-ign-border);
}
.folder-card.busy{opacity:.5;pointer-events:none}
.folder-card .ico{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0;
  color:var(--folder-text);transition:color .3s}
.folder-card.ignored .ico{color:var(--folder-ign-text)}
.folder-card .cbody{flex:1;min-width:0}
.folder-card .ctitle{
  font-size:.72rem;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;line-height:1.3;
  color:var(--folder-text);
}
.folder-card.ignored .ctitle{color:var(--folder-ign-text)}
.folder-card .cmeta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;align-items:center}

@keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.ico{font-size:1.1rem;width:24px;text-align:center;color:var(--muted);flex-shrink:0;transition:color .3s}
.cbody{flex:1;min-width:0}
.ctitle{
  font-size:.74rem;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;line-height:1.3;
}
.card.ignored .ctitle{color:var(--ignored-text)}
.card.covered .ctitle{color:var(--covered-text)}
.ctitle mark{background:transparent;color:var(--accent);font-weight:800}
.cmeta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;align-items:center}
.badge{font-size:.52rem;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.b-sub{background:#111125;color:var(--muted);border:1px solid var(--border)}
.b-ignored{background:#3a0055;color:var(--ignored-text);border:1px solid var(--ignored-border)}
.b-covered{background:#0a1830;color:var(--covered-text);border:1px solid var(--covered-border)}
.b-folder{background:#102030;color:var(--folder-text);border:1px solid var(--folder-border)}
.b-folder-ign{background:#1a0a30;color:var(--folder-ign-text);border:1px solid var(--folder-ign-border)}

/* ignore button */
.btn-ign{
  flex-shrink:0;background:var(--bg);border:1px solid var(--border);
  border-radius:9px;padding:8px 11px;font-size:.64rem;color:var(--text);
  cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:600;
  transition:border-color .15s,color .15s,background .15s;white-space:nowrap;
}
.btn-ign:active{background:var(--border)}
.btn-ign.done{border-color:var(--accent);color:var(--accent);background:#200030}
.btn-ign.folder-done{border-color:var(--folder-ign-border);color:var(--folder-ign-text);background:#150a25}
.btn-ign.covered{border-color:var(--covered-border);color:var(--covered-text);background:#0a1520}
.btn-ign.fail{border-color:var(--danger);color:var(--danger)}

.section-label{
  font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
  padding:6px 4px 2px;
}
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:var(--muted);
  font-size:.73rem;text-align:center;padding:40px;
}
.empty .ei{font-size:2.2rem;opacity:.22}

#toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom)+18px);left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--surf2);border:1px solid var(--accent);border-radius:9px;
  padding:9px 18px;font-size:.7rem;color:var(--accent);white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:99;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{border-color:var(--danger);color:var(--danger)}
#toast.warn{border-color:#ffa040;color:#ffa040}

@keyframes gpulse{0%,100%{text-shadow:none}50%{text-shadow:0 0 8px var(--accent)}}
.just-added{animation:gpulse .6s ease}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo"><span class="logo-plex">PLEX</span><em class="logo-ign">ignore</em></div>
  <div class="hdr-right">
    <span id="lbl-status"></span>
    <div id="dot"></div>
  </div>
</header>

<div id="offline-banner">
  <div class="ei">🖥️</div>
  <h3>Server apagado</h3>
  <p>Ejecutá el servidor en tu PC:</p>
  <code>python plexignore_server.py</code>
  <p style="font-size:.62rem;margin-top:4px">Puerto 8766 · Tailscale IP</p>
  <button class="btn-retry" onclick="retryConnect()">↻ Reintentar</button>
</div>

<div id="main">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-ico">🔍</span>
      <input id="search-input" type="search" placeholder="Buscar archivo o carpeta…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch(this.value)">
      <button id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="tb-info">
      <b id="lbl-count">–</b> archivos ·
      <span class="ign-count" id="lbl-ign">0</span> ignorados
    </div>
    <button class="btn-sm" onclick="loadFiles()">↻ Refrescar</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setFilter('all',this)">Todos</div>
    <div class="tab"        onclick="setFilter('normal',this)">Activos</div>
    <div class="tab"        onclick="setFilter('ignored',this)">Ignorados</div>
  </div>

  <div id="list"></div>
</div>

</div>
<div id="toast"></div>

<script>
const BASE = "http://100.93.228.17:8766";

let allFiles   = [];
let allFolders = [];
let filter     = "all";
let query      = "";

window.addEventListener("DOMContentLoaded", loadFiles);

/* ── network ── */
async function loadFiles() {
  setDot("", "conectando…");
  try {
    const res  = await fetchWithTimeout(BASE + "/files", 4500);
    const data = await res.json();
    // El servidor devuelve { files: [...], folders: [...] }
    // Soporte retrocompatible: si devuelve array directo (versión vieja)
    if (Array.isArray(data)) {
      allFiles   = data;
      allFolders = [];
    } else {
      allFiles   = data.files   || [];
      allFolders = data.folders || [];
    }
    setDot("ok", "en línea");
    showMain();
    updateCounts();
    renderList();
  } catch(e) {
    setDot("err", "sin conexión");
    showOffline();
  }
}

async function retryConnect() { await loadFiles(); }

/* ── actualizar estado local tras respuesta del servidor ── */
function applyServerData(data) {
  if (data.files)   allFiles   = data.files;
  if (data.folders) allFolders = data.folders;
  updateCounts();
  renderList();
}

/* ── ignore / unignore de ARCHIVO ── */
async function doIgnore(rel, rootRel, subdir) {
  try {
    const res  = await fetch(BASE + "/ignore", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ rel, root_rel: rootRel || rel, subdir: subdir || "" })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    applyServerData(data);
    let msg = "Agregado a .plexignore";
    if (data.added && data.added.length > 1)  msg += ` (${data.added.join(", ")})`;
    if (data.skipped && data.skipped.length)  msg += ` · ${data.skipped.length} ya cubiertos`;
    toast(msg, false, data.skipped && data.skipped.length > 0);
  } catch(err) {
    toast("Error: " + err.message, true);
  }
}

async function doUnignore(rel, rootRel, subdir) {
  try {
    const res  = await fetch(BASE + "/unignore", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ rel, root_rel: rootRel || rel, subdir: subdir || "" })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    applyServerData(data);
    let msg = "Eliminado de .plexignore";
    if (data.removed && data.removed.length) msg += `: ${data.removed.join(", ")}`;
    toast(msg);
  } catch(err) {
    toast("Error: " + err.message, true);
  }
}

/* ── ignore / unignore de CARPETA ── */
async function doIgnoreFolder(folderName) {
  try {
    const res  = await fetch(BASE + "/ignore_folder", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ folder: folderName })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    applyServerData(data);
    toast(`Carpeta ignorada: ${folderName}/*`);
  } catch(err) {
    toast("Error: " + err.message, true);
  }
}

async function doUnignoreFolder(folderName) {
  try {
    const res  = await fetch(BASE + "/unignore_folder", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ folder: folderName })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.status);
    applyServerData(data);
    toast(`Carpeta des-ignorada: ${folderName}`);
  } catch(err) {
    toast("Error: " + err.message, true);
  }
}

/* ── search ── */
function onSearch(val) {
  query = val.trim().toLowerCase();
  document.getElementById("search-clear").className = query ? "visible" : "";
  renderList();
}

function clearSearch() {
  document.getElementById("search-input").value = "";
  onSearch("");
  document.getElementById("search-input").focus();
}

/* ── render ── */
function getVisibleFiles() {
  let list = allFiles;
  if (filter === "ignored") list = list.filter(f => f.ignored);
  if (filter === "normal")  list = list.filter(f => !f.ignored);
  if (query) list = list.filter(f => {
    const t = f.title.toLowerCase();
    return t.includes(query) || t.replace(/\./g, ' ').includes(query);
  });
  return list;
}

function getVisibleFolders() {
  let list = allFolders;
  if (filter === "ignored") list = list.filter(f => f.ignored);
  if (filter === "normal")  list = list.filter(f => !f.ignored);
  if (query) list = list.filter(f => {
    const t = f.name.toLowerCase();
    return t.includes(query) || t.replace(/\./g, ' ').includes(query);
  });
  return list;
}

function renderList() {
  const listEl        = document.getElementById("list");
  const visibleFiles  = getVisibleFiles();
  const visibleFolders = getVisibleFolders();
  const totalVisible  = visibleFolders.length + visibleFiles.length;

  if (!totalVisible) {
    listEl.innerHTML = `<div class="empty"><div class="ei">${query ? "🔎" : "🎬"}</div>${query ? "Sin resultados para \"" + esc(query) + "\"" : "Sin archivos en esta categoría"}</div>`;
    return;
  }

  listEl.innerHTML = "";
  let idx = 0;

  // 1. Primero las carpetas (con su fila propia)
  if (visibleFolders.length) {
    const lbl = document.createElement("div");
    lbl.className = "section-label";
    lbl.textContent = "📁 Carpetas";
    listEl.appendChild(lbl);
    visibleFolders.forEach(f => {
      listEl.appendChild(buildFolderCard(f, idx++));
    });
  }

  // 2. Luego los archivos individuales
  if (visibleFiles.length) {
    const lbl = document.createElement("div");
    lbl.className = "section-label";
    lbl.textContent = "🎬 Archivos";
    listEl.appendChild(lbl);
    visibleFiles.forEach(f => {
      listEl.appendChild(buildCard(f, idx++));
    });
  }
}

function highlight(text, q) {
  if (!q) return esc(text);
  const textDots   = text.toLowerCase();
  const textSpaces = textDots.replace(/\./g, ' ');
  let idx = textDots.indexOf(q);
  if (idx === -1) idx = textSpaces.indexOf(q);
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx))
    + "<mark>" + esc(text.slice(idx, idx + q.length)) + "</mark>"
    + esc(text.slice(idx + q.length));
}

/* ── tarjeta de CARPETA ── */
function buildFolderCard(f, i) {
  const isIgnored = f.ignored;
  const card = document.createElement("div");
  card.className = "folder-card" + (isIgnored ? " ignored" : "");
  card.style.animationDelay = Math.min(i * 18, 280) + "ms";
  card.dataset.folder = f.name;

  const ico      = isIgnored ? "🚫" : "📁";
  const btnLabel = isIgnored ? "✕ Quitar" : "⊘ Ignorar";
  const btnClass = "btn-ign" + (isIgnored ? " folder-done" : "");

  const badge = isIgnored
    ? `<span class="badge b-folder-ign">carpeta ignorada</span>`
    : `<span class="badge b-folder">${f.file_count} archivo${f.file_count !== 1 ? "s" : ""}</span>`;

  card.innerHTML = `
    <div class="ico">${ico}</div>
    <div class="cbody">
      <div class="ctitle" title="${esc(f.name)}">${highlight(f.name, query)}</div>
      <div class="cmeta">${badge}</div>
    </div>
    <button class="${btnClass}" data-folder="${esc(f.name)}">${btnLabel}</button>`;

  card.addEventListener("click", e => {
    if (!e.target.closest("button")) handleFolderToggle(e, f.name, isIgnored);
  });
  card.querySelector("button").addEventListener("click", e => {
    e.stopPropagation();
    handleFolderToggle(e, f.name, isIgnored);
  });
  return card;
}

async function handleFolderToggle(e, folderName, currentlyIgnored) {
  const card = document.querySelector(`.folder-card[data-folder="${CSS.escape(folderName)}"]`);
  if (!card || card.classList.contains("busy")) return;
  card.classList.add("busy");
  const btn = card.querySelector("button");
  if (btn) btn.textContent = "…";
  if (currentlyIgnored) {
    await doUnignoreFolder(folderName);
  } else {
    await doIgnoreFolder(folderName);
  }
}

/* ── tarjeta de ARCHIVO ── */
function buildCard(f, i) {
  // Un archivo está "cubierto por carpeta" solo si:
  //   - covered_by_dir está presente Y
  //   - NO está ignorado explícitamente (es decir, es solo pasivo)
  // PERO igualmente debe poder tocarse para ignorarlo de forma individual si se quiere.
  // La única excepción donde bloqueamos la acción es si covered_by_dir y ignored son true
  // porque la carpeta ya lo cubre, no tiene sentido doble-ignorar desde el archivo.
  const isCoveredPassive = f.covered_by_dir && !f.ignored_explicitly;
  const isIgnored        = f.ignored;
  const inSubdir         = !!f.subdir;

  const card = document.createElement("div");
  let cardClass = "card";
  if (isCoveredPassive) cardClass += " covered";
  else if (isIgnored)   cardClass += " ignored";
  card.className = cardClass;
  card.style.animationDelay = Math.min(i * 18, 280) + "ms";
  card.dataset.rel = f.rel;

  // Ícono: 🚫 ignorado explícitamente | 📂 en subcarpeta normal | 🎬 raíz normal
  // (NO mostramos 📁 en archivos individuales — ese ícono es solo para las filas de carpeta)
  const ico = isIgnored ? "🚫" : (inSubdir ? "📂" : "🎬");

  let btnLabel, btnClass;
  if (isCoveredPassive) {
    // Cubierto por carpeta — el botón informa pero no bloquea la acción individual
    btnLabel = "📁 carpeta";
    btnClass = "btn-ign covered";
  } else if (isIgnored) {
    btnLabel = "✕ Quitar";
    btnClass = "btn-ign done";
  } else {
    btnLabel = "⊘ Ignorar";
    btnClass = "btn-ign";
  }

  const rRel   = esc(f.root_rel || f.rel);
  const subdir = esc(f.subdir   || "");

  const badge = isCoveredPassive
    ? `<span class="badge b-covered" title="${esc(f.covered_by_dir)}">carpeta ignorada</span>`
    : (isIgnored ? `<span class="badge b-ignored">ignorado</span>` : "");

  card.innerHTML = `
    <div class="ico">${ico}</div>
    <div class="cbody">
      <div class="ctitle" title="${esc(f.rel)}">${highlight(f.title, query)}</div>
      <div class="cmeta">${badge}</div>
    </div>
    <button class="${btnClass}" onclick="handleIgnore(event,'${esc(f.rel)}','${rRel}','${subdir}')">
      ${btnLabel}
    </button>`;

  // Click en cualquier parte de la card (no en el botón) también togglea
  card.addEventListener("click", e => {
    if (!e.target.closest("button")) handleIgnore(e, f.rel, f.root_rel || f.rel, f.subdir || "");
  });
  return card;
}

async function handleIgnore(e, rel, rootRel, subdir) {
  e.stopPropagation();
  const card    = document.querySelector(`.card[data-rel="${CSS.escape(rel)}"]`);
  const fileObj = allFiles.find(f => f.rel === rel);
  if (!card || card.classList.contains("busy")) return;
  // Si está cubierto pasivamente por carpeta, NO bloqueamos — dejamos que el usuario
  // pueda igualmente ignorar/des-ignorar el archivo individual si lo desea.
  // Solo bloqueamos si el archivo no existe en nuestros datos (caso extremo).
  if (!fileObj) return;
  card.classList.add("busy");
  const btn = card.querySelector(".btn-ign");
  if (btn) btn.textContent = "…";
  if (fileObj.ignored && fileObj.ignored_explicitly) {
    await doUnignore(rel, rootRel, subdir);
  } else if (!fileObj.ignored) {
    await doIgnore(rel, rootRel, subdir);
  } else {
    // Cubierto por carpeta pero no ignorado explícitamente:
    // la acción de ignorar individual tiene sentido de todas formas
    await doIgnore(rel, rootRel, subdir);
  }
}

/* ── UI helpers ── */
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  renderList();
}

function updateCounts() {
  const ignFiles   = allFiles.filter(f => f.ignored).length;
  const ignFolders = allFolders.filter(f => f.ignored).length;
  document.getElementById("lbl-count").textContent = allFiles.length + allFolders.length;
  const lbl = document.getElementById("lbl-ign");
  lbl.textContent = ignFiles + ignFolders;
  lbl.classList.remove("just-added");
  void lbl.offsetWidth;
  lbl.classList.add("just-added");
}

function showOffline() {
  document.getElementById("offline-banner").style.display = "flex";
  document.getElementById("main").style.display = "none";
}
function showMain() {
  document.getElementById("offline-banner").style.display = "none";
  document.getElementById("main").style.display = "flex";
}
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {signal: ctrl.signal});
}
function setDot(type, text="") {
  document.getElementById("dot").className = type;
  document.getElementById("lbl-status").textContent = text;
}
let _tt;
function toast(msg, isErr=false, isWarn=false) {
  const el = document.getElementById("toast");
  clearTimeout(_tt);
  el.textContent = msg;
  el.className = "show" + (isErr ? " err" : isWarn ? " warn" : "");
  _tt = setTimeout(() => { el.className = ""; }, 3800);
}
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
